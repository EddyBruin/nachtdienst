<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kamp 2 – Bedcheck</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0F1923;
      --card: #182433;
      --card2: #1E2D40;
      --border: #263649;
      --text: #EEF2F7;
      --mid: #7A90A8;
      --green: #22C55E;
      --green-bg: #0F2E1C;
      --green-border: #16532E;
      --red: #F97316;
      --red-bg: #2A1506;
      --red-border: #7C3209;
      --yellow: #FBBF24;
      --accent: #3B82F6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.08) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.1) 0%, transparent 100%);
      background-size: 200px 200px, 300px 300px, 150px 150px, 250px 250px, 180px 180px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    /* Header */
    header {
      margin-bottom: 28px;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left {}

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    h1 .moon { color: var(--yellow); }

    .progress-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
    .ring-fg { fill: none; stroke: var(--green); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }

    .ring-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--mid);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 18px;
      flex: 1;
      min-width: 100px;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-num.green { color: var(--green); }
    .stat-num.red { color: var(--red); }
    .stat-num.mid { color: var(--mid); }

    .stat-label {
      font-size: 12px;
      color: var(--mid);
      font-weight: 600;
      margin-top: 3px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mid);
      font-size: 15px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px 11px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--mid); }
    .search-input:focus { border-color: var(--accent); }

    .filter-btns {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      gap: 2px;
    }

    .filter-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--mid);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: var(--card2);
      color: var(--text);
    }

    .btn-reset {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid var(--red-border);
      background: var(--red-bg);
      color: var(--red);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-reset:hover { background: #3d1a07; }

    /* List */
    .kids-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .kid-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      animation: fadeIn 0.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .kid-row:hover { border-color: #3a5070; background: var(--card2); }

    .kid-row.in-bed {
      background: var(--green-bg);
      border-color: var(--green-border);
    }

    .kid-row.in-bed:hover { background: #122819; }

    /* Checkbox */
    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 14px;
    }

    .kid-row.in-bed .checkbox {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .kid-info { flex: 1; min-width: 0; }

    .kid-name {
      font-size: 15px;
      font-weight: 700;
      transition: color 0.2s;
    }

    .kid-row.in-bed .kid-name {
      color: var(--green);
      text-decoration: line-through;
      text-decoration-color: rgba(34,197,94,0.4);
    }

    .kid-sub {
      font-size: 12px;
      color: var(--mid);
      font-weight: 500;
      margin-top: 1px;
    }

    .kid-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .badge-j { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-m { background: rgba(236,72,153,0.15); color: #f472b6; }

    .kid-time {
      font-size: 11px;
      color: var(--mid);
      font-weight: 600;
      text-align: right;
      min-width: 44px;
    }

    .kid-row.in-bed .kid-time { color: var(--green); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--mid);
      font-size: 15px;
      font-weight: 600;
    }

    .empty .icon { font-size: 40px; display: block; margin-bottom: 10px; }

    /* Status dot */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .connection-status {
      font-size: 12px;
      color: var(--mid);
      font-weight: 600;
      display: flex;
      align-items: center;
      margin-top: 8px;
    }

    .connection-status.offline .status-dot { background: var(--red); animation: none; }

    /* Reset modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 360px;
      width: 100%;
    }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .modal p {
      color: var(--mid);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }

    .btn-confirm-reset {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--red);
      color: #fff;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .filter-btn { padding: 7px 10px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-top">
      <div class="header-left">
        <div class="eyebrow">🏕️ Kamp 2</div>
        <h1><span class="moon">🌙</span> Bed­check</h1>
        <div class="connection-status" id="conn-status">
          <span class="status-dot"></span> Verbinden…
        </div>
      </div>
      <div class="progress-ring-wrap">
        <svg class="progress-ring" width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="30"/>
          <circle class="ring-fg" id="ring-fg" cx="36" cy="36" r="30"
            stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        </svg>
        <div class="ring-label" id="ring-pct">0%</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num green" id="stat-in">0</div>
        <div class="stat-label">🛏️ In bed</div>
      </div>
      <div class="stat">
        <div class="stat-num red" id="stat-out">0</div>
        <div class="stat-label">🚶 Nog wakker</div>
      </div>
      <div class="stat">
        <div class="stat-num mid" id="stat-total">0</div>
        <div class="stat-label">👥 Totaal</div>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search" placeholder="Zoek op naam…" oninput="renderList()"/>
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">Alle</button>
      <button class="filter-btn" id="f-out" onclick="setFilter('out')">Wakker</button>
      <button class="filter-btn" id="f-in" onclick="setFilter('in')">In bed</button>
    </div>
    <button class="btn-reset" onclick="showReset()">↺ Reset</button>
  </div>

  <div class="kids-list" id="kids-list">
    <div class="empty"><span class="icon">⏳</span>Kinderen laden…</div>
  </div>

</div>

<!-- Reset modal -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <h2>Alles resetten?</h2>
    <p>Dit zet alle kinderen terug naar "nog wakker" op alle apparaten tegelijk.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="hideReset()">Annuleren</button>
      <button class="btn-confirm-reset" onclick="doReset()">Ja, reset alles</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, update, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ── CONFIGURATIE ────────────────────────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDSry49kW8sLAL3uU_IRSthimDuddozey4",
    authDomain: "nachtdienst-kamp2.firebaseapp.com",
    databaseURL: "https://nachtdienst-kamp2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nachtdienst-kamp2",
    storageBucket: "nachtdienst-kamp2.firebasestorage.app",
    messagingSenderId: "309122802243",
    appId: "1:309122802243:web:dab6705d640f25e0bf2af6"
  };

  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyw4SmPCUYoy2DU92F1vDy1SzpxlOoWkUnT9tRkGM9MuRTwGO1Kc9PNjWW8nPNKfD2Trw/exec';
  // ────────────────────────────────────────────────────────────────

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getDatabase(app);
  const bedRef = ref(db, 'bedcheck');

  let kinderen = [];
  let bedStatus = {}; // { "Naam Achternaam": { inBed: true, time: "22:14" } }
  let filter = 'all';

  // Load kids from Apps Script
  async function loadKinderen() {
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      kinderen = await res.json();
      document.getElementById('stat-total').textContent = kinderen.length;
      renderList();
    } catch(e) {
      document.getElementById('kids-list').innerHTML =
        '<div class="empty"><span class="icon">😬</span>Kon kinderen niet laden</div>';
    }
  }

  // Listen to Firebase realtime updates
  onValue(bedRef, function(snapshot) {
    bedStatus = snapshot.val() || {};
    updateStats();
    renderList();
    updateRing();
  });

  // Connection status
  import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js').then(({ ref: dbRef, onValue: onVal }) => {
    const connRef = dbRef(db, '.info/connected');
    onVal(connRef, (snap) => {
      const el = document.getElementById('conn-status');
      if (snap.val()) {
        el.innerHTML = '<span class="status-dot"></span> Live verbonden';
        el.className = 'connection-status';
      } else {
        el.innerHTML = '<span class="status-dot"></span> Verbinding verbroken';
        el.className = 'connection-status offline';
      }
    });
  });

  function kidKey(k) {
    return (k.voornaam + ' ' + k.achternaam).trim();
  }

  window.toggleKid = function(key) {
    var current = bedStatus[key] || { inBed: false };
    var newVal = !current.inBed;
    var now = new Date();
    var timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    var updates = {};
    updates[key] = { inBed: newVal, time: newVal ? timeStr : null };
    update(bedRef, updates);
  };

  window.setFilter = function(f) {
    filter = f;
    ['all','out','in'].forEach(function(x) {
      document.getElementById('f-' + x).classList.toggle('active', x === f);
    });
    renderList();
  };

  window.showReset = function() {
    document.getElementById('modal').style.display = 'flex';
  };

  window.hideReset = function() {
    document.getElementById('modal').style.display = 'none';
  };

  window.doReset = function() {
    set(bedRef, {});
    hideReset();
  };

  function updateStats() {
    var inBed = Object.values(bedStatus).filter(function(v){ return v && v.inBed; }).length;
    var total = kinderen.length;
    document.getElementById('stat-in').textContent = inBed;
    document.getElementById('stat-out').textContent = total - inBed;
    document.getElementById('stat-total').textContent = total;
  }

  function updateRing() {
    var inBed = Object.values(bedStatus).filter(function(v){ return v && v.inBed; }).length;
    var total = kinderen.length || 1;
    var pct = inBed / total;
    var circumference = 188.5;
    var offset = circumference * (1 - pct);
    document.getElementById('ring-fg').style.strokeDashoffset = offset;
    document.getElementById('ring-pct').textContent = Math.round(pct * 100) + '%';
  }

  window.renderList = function() {
    if (!kinderen.length) return;
    var query = document.getElementById('search').value.toLowerCase().trim();

    var filtered = kinderen.filter(function(k) {
      var key = kidKey(k);
      var status = bedStatus[key] || { inBed: false };
      var matchSearch = !query || key.toLowerCase().includes(query);
      var matchFilter = filter === 'all' ||
        (filter === 'in' && status.inBed) ||
        (filter === 'out' && !status.inBed);
      return matchSearch && matchFilter;
    });

    // Sort: not-in-bed first, then alphabetically
    filtered.sort(function(a, b) {
      var sa = (bedStatus[kidKey(a)] || {}).inBed ? 1 : 0;
      var sb = (bedStatus[kidKey(b)] || {}).inBed ? 1 : 0;
      if (sa !== sb) return sa - sb;
      return kidKey(a).localeCompare(kidKey(b));
    });

    if (!filtered.length) {
      document.getElementById('kids-list').innerHTML =
        '<div class="empty"><span class="icon">🔍</span>Niemand gevonden</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(k, i) {
      var key = kidKey(k);
      var status = bedStatus[key] || { inBed: false };
      var isJ = k.geslacht && (k.geslacht.toLowerCase().startsWith('j') || k.geslacht.toLowerCase() === 'm');
      var delay = Math.min(i * 0.03, 0.3);

      html += '<div class="kid-row' + (status.inBed ? ' in-bed' : '') + '" ' +
        'onclick="toggleKid(\'' + key.replace(/'/g, "\\'") + '\')" ' +
        'style="animation-delay:' + delay + 's">' +
        '<div class="checkbox">' + (status.inBed ? '✓' : '') + '</div>' +
        '<div class="kid-info">' +
          '<div class="kid-name">' + k.voornaam + ' ' + k.achternaam + '</div>' +
          '<div class="kid-sub">' + (k.leeftijd ? k.leeftijd + ' jaar' : '') + '</div>' +
        '</div>' +
        '<span class="kid-badge ' + (isJ ? 'badge-j' : 'badge-m') + '">' + (k.geslacht || '?') + '</span>' +
        '<div class="kid-time">' + (status.inBed && status.time ? status.time : '') + '</div>' +
      '</div>';
    });

    document.getElementById('kids-list').innerHTML = html;
  };

  loadKinderen();
</script>
</body>
</html>
